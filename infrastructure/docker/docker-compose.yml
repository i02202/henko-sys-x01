version: '3.8'

# Henko Sys x01 — Infrastructure Services
# Phase 1: n8n only (lightest service first)
# Phase 1b: Add Appwrite + PostHog later

services:
  # ============================================
  # n8n — Workflow Automation (Port 5678)
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: henko-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-henko-sys-x01-n8n-key}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-henko_n8n_pass}
      - WEBHOOK_URL=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - henko-net

  n8n-postgres:
    image: postgres:16-alpine
    container_name: henko-n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:-henko_n8n_pass}
      - POSTGRES_DB=n8n
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - henko-net

volumes:
  n8n_data:
  n8n_postgres_data:

networks:
  henko-net:
    name: henko-network
    driver: bridge
